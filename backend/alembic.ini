[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# System path to add to the Python interpreter
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# Leave blank for localtime
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# Version number format
# version_num_format = %04d

# Version path separator
# version_path_separator = :

# Version path separator for windows
# version_path_separator = ;

# Order of modules to be searched for the function
# that will be called by the revisio command
# version_locations = %(here)s/bar:%(here)s/bat:migrations/versions

# Order of modules to be searched for the function
# that will be called by the revision command
# If empty, the order will default to the order
# specified in the application
# format_kwargs = {}

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
