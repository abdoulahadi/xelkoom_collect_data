[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  VITE_API_URL = "https://backend-xelkoom-collect.onrender.com"
  VITE_WS_URL = "https://backend-xelkoom-collect.onrender.com"
  VITE_DEV_MODE = "false"
  VITE_LOG_LEVEL = "error"
  VITE_APP_NAME = "Xelkoom Admin"
  VITE_APP_VERSION = "1.0.0"

[context.deploy-preview.environment]
  VITE_API_URL = "https://backend-xelkoom-collect.onrender.com"
  VITE_WS_URL = "https://backend-xelkoom-collect.onrender.com"
  VITE_DEV_MODE = "true"
  VITE_LOG_LEVEL = "debug"
  VITE_APP_NAME = "Xelkoom Admin (Preview)"
  VITE_APP_VERSION = "1.0.0-preview"

[context.branch-deploy.environment]
  VITE_API_URL = "https://backend-xelkoom-collect.onrender.com"
  VITE_WS_URL = "https://backend-xelkoom-collect.onrender.com"
  VITE_DEV_MODE = "true"
  VITE_LOG_LEVEL = "debug"
  VITE_APP_NAME = "Xelkoom Admin (Development)"
  VITE_APP_VERSION = "1.0.0-dev"

# Headers pour la sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Headers pour les assets statiques
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
